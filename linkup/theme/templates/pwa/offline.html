{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#05050a" media="(prefers-color-scheme: dark)">
  <title>Offline — LinkUp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100dvh; padding: 24px;
      background: #fafafa; color: #18181b;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #05050a; color: #e4e4e7; }
    }
    .container { text-align: center; max-width: 400px; }
    .icon { width: 80px; height: 80px; margin: 0 auto 24px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 15px; line-height: 1.6; color: #71717a; margin-bottom: 24px; }
    @media (prefers-color-scheme: dark) p { color: #5c5c7a; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 24px; border-radius: 8px;
      background: #7c3aed; color: #fff; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      text-decoration: none; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    @media (prefers-color-scheme: dark) .btn { background: #8b5cf6; }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 8v4M12 16h.01"/>
    </svg>
    <h1>You're offline</h1>
    <p>Check your connection and try again. Some features may be unavailable until you're back online.</p>
    <button class="btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Try again
    </button>
  </div>
</body>
</html>
