{% extends 'base.html' %}

{% block content %}
<div class="max-w-lg mx-auto mt-12">
  <div class="glass-card p-8 text-center scroll-reveal">
    <div class="w-14 h-14 rounded-xl bg-amber-500/10 flex items-center justify-center mx-auto mb-4">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <h1 class="text-xl font-bold text-[var(--text-primary)] mb-2">User Not Found</h1>
    <p class="text-sm text-[var(--text-secondary)] mb-6">The user "{{ username }}" could not be found. They may have deactivated their account or the username may be incorrect.</p>
    <div class="flex items-center justify-center gap-3">
      <a href="{% url 'messaging:inbox' %}" class="btn-primary text-sm">Back to Messages</a>
      <a href="{% url 'search' %}?q={{ username }}" class="btn-secondary text-sm">Search Users</a>
    </div>
  </div>
</div>
{% endblock %}
