{% extends 'base.html' %}

{% block content %}
<div class="max-w-lg mx-auto mt-12">
  <div class="glass-card p-8 text-center scroll-reveal">
    <div class="w-14 h-14 rounded-xl bg-red-500/10 flex items-center justify-center mx-auto mb-4">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    </div>
    <h1 class="text-xl font-bold text-[var(--text-primary)] mb-2">Messaging Error</h1>
    <p class="text-sm text-[var(--text-secondary)] mb-6">{{ error_message|default:"An error occurred while processing your request." }}</p>
    <div class="flex items-center justify-center gap-3">
      <a href="{% url 'messaging:inbox' %}" class="btn-primary text-sm">Back to Messages</a>
      <button onclick="window.location.reload()" class="btn-secondary text-sm">Try Again</button>
    </div>
  </div>
</div>
{% endblock %}
