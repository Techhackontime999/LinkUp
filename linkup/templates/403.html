{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied - LinkUp</title>
  {% tailwind_css %}
  <link rel="stylesheet" href="{% static 'css/custom_styles.css' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: light dark; }
    body { background: var(--bg-primary); color: var(--text-primary); font-family: Inter, system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 1rem; }
  </style>
</head>
<body>
  <div class="auth-card" style="max-width:440px;text-align:center">
    <div class="w-16 h-16 rounded-xl bg-amber-500/10 flex items-center justify-center mx-auto mb-5">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="1.5"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1 style="font-size:clamp(2.5rem,10vw,4rem);font-weight:800;color:var(--text-primary);margin:0 0 0.25rem">403</h1>
    <h2 style="font-size:clamp(1rem,4vw,1.25rem);font-weight:600;color:var(--text-primary);margin:0 0 0.5rem">Access Denied</h2>
    <p style="color:var(--text-secondary);margin-bottom:2rem;font-size:0.9rem;line-height:1.6">You don't have permission to access this page. If you believe this is an error, please contact support.</p>
    <div style="display:flex;flex-direction:column;gap:0.75rem">
      <a href="/" class="btn-primary" style="text-align:center;text-decoration:none">Go to Homepage</a>
      <button onclick="history.back()" class="btn-secondary" style="text-align:center">Go Back</button>
    </div>
  </div>
</body>
</html>
