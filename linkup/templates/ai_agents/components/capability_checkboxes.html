{% comment %}
Reusable capability checkboxes component
Usage: {% include "ai_agents/components/capability_checkboxes.html" %}
{% endcomment %}

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <label class="flex items-center space-x-3 p-3 border border-gray-200 dark:border-gray-700 rounded-lg hover:bg-white dark:hover:bg-gray-800 cursor-pointer">
        <input type="checkbox" 
               name="cap_nlp" 
               value="true"
               {% if form_data.cap_nlp or agent.capabilities.nlp %}checked{% endif %}
               class="rounded border-gray-300 text-purple-600 focus:ring-purple-500">
        <div>
            <div class="text-sm font-medium text-gray-900 dark:text-white">Natural Language Processing</div>
            <div class="text-xs text-gray-500 dark:text-gray-400">Text understanding and generation</div>
        </div>
    </label>

    <label class="flex items-center space-x-3 p-3 border border-gray-200 dark:border-gray-700 rounded-lg hover:bg-white dark:hover:bg-gray-800 cursor-pointer">
        <input type="checkbox" 
               name="cap_reasoning" 
               value="true"
               {% if form_data.cap_reasoning or agent.capabilities.reasoning %}checked{% endif %}
               class="rounded border-gray-300 text-purple-600 focus:ring-purple-500">
        <div>
            <div class="text-sm font-medium text-gray-900 dark:text-white">Reasoning</div>
            <div class="text-xs text-gray-500 dark:text-gray-400">Logical thinking and problem solving</div>
        </div>
    </label>

    <label class="flex items-center space-x-3 p-3 border border-gray-200 dark:border-gray-700 rounded-lg hover:bg-white dark:hover:bg-gray-800 cursor-pointer">
        <input type="checkbox" 
               name="cap_code" 
               value="true"
               {% if form_data.cap_code or agent.capabilities.code_generation %}checked{% endif %}
               class="rounded border-gray-300 text-purple-600 focus:ring-purple-500">
        <div>
            <div class="text-sm font-medium text-gray-900 dark:text-white">Code Generation</div>
            <div class="text-xs text-gray-500 dark:text-gray-400">Writing and analyzing code</div>
        </div>
    </label>

    <label class="flex items-center space-x-3 p-3 border border-gray-200 dark:border-gray-700 rounded-lg hover:bg-white dark:hover:bg-gray-800 cursor-pointer">
        <input type="checkbox" 
               name="cap_data" 
               value="true"
               {% if form_data.cap_data or agent.capabilities.data_analysis %}checked{% endif %}
               class="rounded border-gray-300 text-purple-600 focus:ring-purple-500">
        <div>
            <div class="text-sm font-medium text-gray-900 dark:text-white">Data Analysis</div>
            <div class="text-xs text-gray-500 dark:text-gray-400">Processing and analyzing data</div>
        </div>
    </label>

    <label class="flex items-center space-x-3 p-3 border border-gray-200 dark:border-gray-700 rounded-lg hover:bg-white dark:hover:bg-gray-800 cursor-pointer">
        <input type="checkbox" 
               name="cap_image" 
               value="true"
               {% if form_data.cap_image or agent.capabilities.image_generation %}checked{% endif %}
               class="rounded border-gray-300 text-purple-600 focus:ring-purple-500">
        <div>
            <div class="text-sm font-medium text-gray-900 dark:text-white">Image Generation</div>
            <div class="text-xs text-gray-500 dark:text-gray-400">Creating and editing images</div>
        </div>
    </label>

    <label class="flex items-center space-x-3 p-3 border border-gray-200 dark:border-gray-700 rounded-lg hover:bg-white dark:hover:bg-gray-800 cursor-pointer">
        <input type="checkbox" 
               name="cap_multimodal" 
               value="true"
               {% if form_data.cap_multimodal or agent.capabilities.multimodal %}checked{% endif %}
               class="rounded border-gray-300 text-purple-600 focus:ring-purple-500">
        <div>
            <div class="text-sm font-medium text-gray-900 dark:text-white">Multimodal</div>
            <div class="text-xs text-gray-500 dark:text-gray-400">Multiple input/output types</div>
        </div>
    </label>
</div>
