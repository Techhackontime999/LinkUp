{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - LinkUp</title>
  {% tailwind_css %}
  <link rel="stylesheet" href="{% static 'css/custom_styles.css' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: light dark; }
    body { background: var(--bg-primary); color: var(--text-primary); font-family: Inter, system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 1rem; }
  </style>
</head>
<body>
  <div class="auth-card" style="max-width:440px;text-align:center">
    <div class="w-16 h-16 rounded-xl bg-[var(--accent)]/10 flex items-center justify-center mx-auto mb-5">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
    </div>
    <h1 style="font-size:4rem;font-weight:800;color:var(--text-primary);margin:0 0 0.25rem">404</h1>
    <h2 style="font-size:1.25rem;font-weight:600;color:var(--text-primary);margin:0 0 0.5rem">Page Not Found</h2>
    <p style="color:var(--text-secondary);margin-bottom:2rem;font-size:0.9rem;line-height:1.6">Sorry, we couldn't find the page you're looking for. It might have been moved or deleted.</p>
    <div style="display:flex;flex-direction:column;gap:0.75rem">
      <a href="/" class="btn-primary" style="text-align:center;text-decoration:none">Go to Homepage</a>
      <button onclick="history.back()" class="btn-secondary" style="text-align:center">Go Back</button>
    </div>
  </div>
</body>
</html>
